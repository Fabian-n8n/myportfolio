<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 4 main overlapping circles in 2x2 grid -->
  <circle cx="37" cy="40" r="24" fill="#16120E"/>
  <circle cx="63" cy="40" r="24" fill="#16120E"/>
  <circle cx="37" cy="60" r="24" fill="#16120E"/>
  <circle cx="63" cy="60" r="24" fill="#16120E"/>
  <!-- 4-pointed star/diamond cutout at intersection — cream matches tile bg -->
  <path d="M50 40 L59 50 L50 60 L41 50 Z" fill="#F0EBE1"/>

  <!-- Surrounding dots — top row -->
  <circle cx="20" cy="12" r="2.5" fill="#16120E"/>
  <circle cx="37" cy="9"  r="5"   fill="#16120E"/>
  <circle cx="63" cy="10" r="3.5" fill="#16120E"/>
  <circle cx="80" cy="13" r="2.5" fill="#16120E"/>
  <!-- Left column -->
  <circle cx="9"  cy="33" r="6"   fill="#16120E"/>
  <circle cx="7"  cy="50" r="3"   fill="#16120E"/>
  <circle cx="9"  cy="67" r="4"   fill="#16120E"/>
  <!-- Right column -->
  <circle cx="91" cy="33" r="6"   fill="#16120E"/>
  <circle cx="93" cy="50" r="3"   fill="#16120E"/>
  <circle cx="91" cy="67" r="4"   fill="#16120E"/>
  <!-- Bottom row -->
  <circle cx="20" cy="88" r="2.5" fill="#16120E"/>
  <circle cx="37" cy="91" r="5"   fill="#16120E"/>
  <circle cx="63" cy="90" r="3.5" fill="#16120E"/>
  <circle cx="80" cy="87" r="2.5" fill="#16120E"/>
  <!-- Corner tiny dots -->
  <circle cx="10" cy="10" r="2"   fill="#16120E"/>
  <circle cx="90" cy="10" r="2"   fill="#16120E"/>
  <circle cx="10" cy="90" r="2"   fill="#16120E"/>
  <circle cx="90" cy="90" r="2"   fill="#16120E"/>
</svg>
