<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cream background, subtle rounded corners -->
  <rect width="100" height="100" rx="14" ry="14" fill="#F0EBE1"/>

  <!-- Shadow layer 3 — deepest, lightest tan -->
  <text x="50" y="67"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#C9A87A"
    transform="translate(6, 6)">FW</text>

  <!-- Shadow layer 2 — mid tan -->
  <text x="50" y="67"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#A07848"
    transform="translate(4, 4)">FW</text>

  <!-- Shadow layer 1 — darkest shadow, closest -->
  <text x="50" y="67"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#6B4A26"
    transform="translate(2, 2)">FW</text>

  <!-- Main text — dark charcoal -->
  <text x="50" y="67"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#252018">FW</text>
</svg>
